<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The King</title>

    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <div class="container">
        <h1>The King</h1>

     <img src="../images/king.jpg" alt="King" class="piece-profile-img">

        <input type="checkbox" id="info-toggle" class="tray-checkbox">
        
        <label for="info-toggle" class="chess-button">Piece Info</label>

        <div class="tray">
            <div class="piece-description">
                <p>
                    <strong>Movement:</strong> The King is the most important piece, but is one of the weakest. The King can only move one square in any direction - up, down, to the sides, and diagonally.
                </p>
                <br>
                <p>
                    <strong>Special:</strong> The King can never move himself into check (where he could be captured).
                </p>
            </div>
        </div>

<footer class="socials">
            <a href="pieces.html" class="back-btn">← Back to Pieces</a>
        </footer>

</body>
