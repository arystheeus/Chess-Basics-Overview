<body>

    <div class="container">
        <h1>The Pawn</h1>

     <img src="../images/pawn.jpg" alt="Queen" class="piece-profile-img">

        <input type="checkbox" id="info-toggle" class="tray-checkbox">
        
        <label for="info-toggle" class="chess-button">Piece Info</label>

        <div class="tray">
            <div class="piece-description">
            <p>
                <strong>Movement:</strong> Pawns move one square forward and can never move backward. On their very first move, they have the option to move two squares forward.
            </p>
            <br>
            <p>
                <strong>Capture:</strong> Pawns capture pieces diagonally one square forward. They are the only piece that moves and captures differently.
            </p>
            </div>
        </div>
